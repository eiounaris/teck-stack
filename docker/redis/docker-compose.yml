services:
  redis:
    image: redis:8.8
    container_name: redis-app
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis-data:/data
    command:
      - redis-server
      - --appendonly 
      - "yes"
      - --requirepass 
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge