services:
  mysql:
    image: mysql:8.4
    container_name: mall-lite-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mall_lite_order}
      MYSQL_USER: ${MYSQL_USERNAME:-mall}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mall123456}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8.8
    container_name: mall-lite-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-mall123456}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mall123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:4.3-management
    container_name: mall-lite-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5673}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15673}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-mall}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-mall123456}
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
