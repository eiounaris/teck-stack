server:
  port: ${SERVER_PORT:18084}

spring:
  application:
    name: mall-lite-order
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:13306/mall_lite_order?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:mall}
    password: ${MYSQL_PASSWORD:mall123456}
    hikari:
      pool-name: MallLiteOrderHikariPool
      minimum-idle: 1
      maximum-pool-size: 10
      connection-timeout: 3000
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
      password: ${REDIS_PASSWORD:mall123456}
      timeout: 3s
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USERNAME:mall}
    password: ${RABBITMQ_PASSWORD:mall123456}
    virtual-host: ${RABBITMQ_VHOST:/}
  sql:
    init:
      mode: never

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    banner: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

mall:
  security:
    jwt:
      issuer: mall-lite-order
      secret: ${JWT_SECRET:mall-lite-order-dev-jwt-secret-key-change-me-2026}
      expiration: ${JWT_EXPIRATION:2h}
  cache:
    product:
      detail-key-prefix: "mall:product:detail:"
      detail-ttl: 30m
      null-ttl: 2m
      ttl-jitter: 5m

logging:
  level:
    root: info
    com.eiou.mall: info
