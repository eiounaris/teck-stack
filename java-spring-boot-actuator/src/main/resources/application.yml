spring:
  application:
    name: spring-boot-actuator-demo

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,beans,conditions,loggers
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: spring-boot-actuator-demo
    description: Spring Boot Actuator quick-reference module

logging:
  level:
    com.eiou.spring.boot.actuator: INFO
